<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Popcorn</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }

        .error-icon {
            font-size: 5rem;
            color: #e5a00d;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .error-message {
            color: #999;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .home-button {
            background: #e5a00d;
            border: none;
            color: #121212;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .home-button:hover {
            background: #cc8f0a;
            color: #121212;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1>Oops! Something went wrong</h1>
        <p class="error-message">{{ message }}</p>
        <a href="/guide" class="home-button">
            <i class="fas fa-home"></i> Go to Home
        </a>
    </div>
</body>
</html>
