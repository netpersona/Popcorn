<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening {{ movie_title }} in Plex...</title>
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        h1 {
            color: #e5a00d;
            margin-bottom: 20px;
        }
        .loader {
            margin: 30px auto;
            width: 50px;
            height: 50px;
            border: 4px solid #2a2a2a;
            border-top-color: #e5a00d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #e5a00d;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Opening in Plex...</h1>
        <div class="loader"></div>
        <p>If Plex doesn't open automatically, <a href="{{ web_url }}" id="fallback-link">click here</a></p>
    </div>
    <script>
        window.location.href = {{ plex_uri|tojson }};
        
        setTimeout(function() {
            window.location.href = {{ web_url|tojson }};
        }, 3000);
    </script>
</body>
</html>
